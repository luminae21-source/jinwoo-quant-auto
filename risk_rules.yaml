# risk_rules.yaml — 진우퀀트 티어1 리스크 규칙 (단일 진실원천) · 2026-06-07
# 티어1 = 지금 바로 룰화하는 운영 안전장치 + 테마 행동규칙 (백테스트/일봉 불필요).
# 검증으로 기각된 항목(본체 밴드·변동성타겟)은 포함하지 않음.
# 값은 seed. 변경 시 이 파일만 수정하면 tier1_risk_rules.py가 따라감.

본체:
  MDD_메타룰:
    경보_월수익: -0.10      # 실현 월수익 < -10% (역대 최악월 -9.79% 갱신) → 점검 플래그
    축소_낙폭: -0.18        # 실현 누적낙폭 < -18% (백테스트 MDD -12.21% x ~1.5) → 노출축소·전수점검
    백테스트_MDD: -0.1221   # 참고 기준선

테마:
  진입가드:
    급등보류_pct: 0.10       # 직전 봉 대비 +10% 이상 급등 시 당일 신규진입 보류
    VI상한가_신규금지: true   # VI 발동/상한가 호가 시 신규진입 금지
  분할:
    정찰비율: 0.33          # 1차 정찰 1/3 → 추세·거래량 확인 후 잔여
    "1차익절": 0.5          # 목표 도달 시 절반 익절 (잔량 트레일링은 티어2)
  집중한도:
    lane총비중: 0.20        # 테마 lane 합계 ≤ 총자산 20%
    동일테마_종목수: 2       # 동일 테마 ≤ 2종목
    동일테마_비중: 0.40      # 동일 테마 합계 ≤ lane 40%
    "1종목_비중_of_lane": 0.25   # 1종목 ≤ lane 25% (= 총자산 5%)
    보유수: 5               # 동시 보유 ≤ 5종목
  킬스위치:
    월손실: -0.15           # lane 월 누적 ≤ -15% → 당월 신규진입 정지
    분기손실: -0.25         # lane 분기 누적 ≤ -25% → 전량 점검·축소
  위험예산:                 # 2026-06-07 보강(포트폴리오 heat·스트릭·추세필터)
    포트폴리오_heat: 0.06    # 모든 미결 포지션 동시손절 시 총위험 ≤ 6%(개별 2%룰 위 상한)
    연속손실_사이즈축소: 3    # 3연속 손절 → 다음 진입 사이즈 1/2
    연속손실_중단: 5         # 5연속 손절 → 당주 신규중단·점검
  추세필터게이트:             # regime_detector_v40 연결(방향만 적용은 안전, 임계는 검증후)
    risk_off_신규보류: false  # 2026-06-07 백테스트 기각: RISK_OFF 진입이 더 나쁘지 않음(레짐타이밍 무효). 검증결과 문서
    소스: regime_detector_v40
  사이징:                   # (티어2 — 실거래 시점. 헬퍼로 동봉)
    리스크_per_trade: 0.02
    k_ATR: 2.5          # 2026-06-07 실데이터+OOS 검증으로 3.0→2.5 확정(꼬리통제 우위, 검증결과 문서)
    하한가_손절상한: -0.20   # 손절폭이 -20%보다 깊으면 진입 스킵(하한가 체결불가 회피)
    주문_ADTV_비율: 0.01
