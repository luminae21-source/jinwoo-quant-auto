<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<title>진우퀀트 — KOSDAQ 테마 lane 대시보드</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--ink:#1b1f27;--mut:#6b7280;--line:#e5e7eb;--accent:#2563eb;
--green:#15803d;--greenbg:#dcfce7;--amber:#b45309;--amberbg:#fef3c7;--blue:#1d4ed8;--bluebg:#dbeafe;--red:#b91c1c;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;font-size:15px;line-height:1.45}
.wrap{max-width:1000px;margin:0 auto;padding:12px 12px 60px}
header{position:sticky;top:0;background:var(--bg);padding:10px 0 8px;z-index:5;border-bottom:1px solid var(--line)}
h1{font-size:18px;margin:0 0 2px}
.sub{color:var(--mut);font-size:12.5px;margin:0 0 8px}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:7px 12px;font-size:13px;cursor:pointer;white-space:nowrap;user-select:none}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.small{padding:6px 10px;font-size:12.5px}
.bar{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
input[type=search]{flex:1;min-width:140px;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;background:#fff}
select{border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:13px;background:#fff}
.note{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12.5px;border-radius:10px;padding:8px 10px;margin:8px 0}
.summary{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 2px}
.stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:12.5px}
.stat b{font-size:15px}
.count{color:var(--mut);font-size:12.5px;margin:10px 2px 6px}
.list{display:grid;grid-template-columns:1fr;gap:9px}
@media(min-width:680px){.list{grid-template-columns:1fr 1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 12px}
.crow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.nm{font-weight:600;font-size:15px}
.cd{color:var(--mut);font-size:11.5px;font-weight:400}
.bdg{display:inline-block;font-size:11px;padding:2px 7px;border-radius:999px;margin-left:4px;white-space:nowrap}
.b-early{background:#f1f5f9;color:#475569}.b-late{background:var(--amberbg);color:var(--amber)}
.b-soei{background:var(--bluebg);color:var(--blue)}.b-pass{background:var(--greenbg);color:var(--green)}
.b-passx{background:#f1f5f9;color:#475569;border:1px dashed #cbd5e1}
.theme-b{background:#eef2ff;color:#3730a3}
.met{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:8px;font-size:12.5px;color:#374151}
.met span b{color:var(--ink)}
.pos{color:var(--green)}.neg{color:var(--red)}
.ind{color:var(--mut);font-size:11.5px;margin-top:5px}
.wcard{border-left:4px solid var(--accent)}
.pending{color:var(--amber);font-weight:600}
.done{color:var(--green);font-weight:600}
footer{color:var(--mut);font-size:11.5px;margin-top:18px;text-align:center;line-height:1.6}
.legend{font-size:11.5px;color:var(--mut);margin:4px 2px;display:flex;gap:10px;flex-wrap:wrap}
</style></head>
<body><div class="wrap">
<header>
<h1>KOSDAQ 테마 lane 대시보드</h1>
<p class="sub" id="subt"></p>
<div class="chips" id="themeChips"></div>
<div class="bar">
<div class="chips" id="statChips" style="flex:1"></div>
<select id="sortSel">
<option value="mcap">시총↓</option><option value="adtv">거래대금↓</option>
<option value="rev">매출성장↓</option><option value="mom">모멘텀↓</option>
<option value="distlow">고점근접순</option><option value="name">가나다</option>
</select>
</div>
<div class="bar"><input type="search" id="q" placeholder="종목명 검색…"></div>
</header>
<div class="note">⚠️ 가드레일 통과 = <b>'고려 가능'일 뿐 매수신호 아님</b>. 종목·thesis·매수는 진우. (테마=forward라 과거 수익 시뮬 아님 — 현재 후보 탐색용)</div>
<div class="summary" id="summary"></div>
<div class="legend">
<span><span class="bdg b-early">early</span> 선반영 여지</span>
<span><span class="bdg b-late">late</span> 급등·고점근접(추격주의)</span>
<span><span class="bdg b-soei">소외</span> 역발상 후보</span>
<span><span class="bdg b-pass">PASS</span> 가드레일 통과</span>
<span><span class="bdg b-passx">PASS*</span> 재무無=수동확인</span>
</div>
<div class="count" id="count"></div>
<div class="list" id="list"></div>
<footer id="foot"></footer>
</div>

  let st=["전체","early","late","소외"];
  document.getElementById("statChips").innerHTML=st.map(s=>chip(s,state.status===s)).join("");
  document.querySelectorAll("#themeChips .chip").forEach(el=>el.onclick=()=>{state.theme=el.dataset.th;sync();});
  document.querySelectorAll("#statChips .chip").forEach(el=>el.onclick=()=>{state.status=el.dataset.v;sync();});
}
function card(r){
  let st=statusOf(r.flag);
  let sb = st==="late"?'<span class="bdg b-late">'+r.flag+'</span>':(st==="소외"?'<span class="bdg b-soei">소외</span>':'<span class="bdg b-early">early</span>');
  let gb = r.guard==="PASS"?'<span class="bdg b-pass">PASS</span>':(r.guard?'<span class="bdg b-passx">'+r.guard+'</span>':'');
  return '<div class="card"><div class="crow"><div><span class="nm">'+r.name+'</span> <span class="cd">'+r.code+'</span>'+
    '<span class="bdg theme-b">'+r.theme+'</span></div><div>'+sb+gb+'</div></div>'+
    '<div class="met"><span>시총 <b>'+won(r.mcap)+'</b></span><span>거래대금 <b>'+won(r.adtv)+'</b></span>'+
    '<span>매출 <b class="'+cls(r.rev)+'">'+pct(r.rev)+'</b></span><span>모멘텀 <b class="'+cls(r.mom)+'">'+pct(r.mom)+'</b></span>'+
    '<span>고점대비 <b class="'+cls(r.dist)+'">'+pct(r.dist)+'</b></span></div>'+
    '<div class="ind">'+r.ind+'</div></div>';
}
function wcard(w){
  let gb = w.guard==="PASS"?'<span class="bdg b-pass">PASS</span>':(w.guard?'<span class="bdg b-passx">'+w.guard+'</span>':'');
  let ts = w.has?'<span class="done">thesis 기입됨</span>':'<span class="pending">thesis 대기 — 클로드에게 말로</span>';
  return '<div class="card wcard"><div class="crow"><div><span class="nm">'+w.name+'</span> <span class="cd">'+w.code+'</span>'+
    '<span class="bdg theme-b">'+w.theme+'</span></div><div>'+gb+'</div></div>'+
    '<div class="met"><span>'+(w.board||"")+'</span><span>시총 <b>'+won(w.mcap)+'</b></span><span>거래대금 <b>'+won(w.adtv)+'</b></span><span>부채비율 <b>'+(w.debt||"-")+'</b></span></div>'+
    '<div class="ind">'+ts+(w.has?(' · '+w.thesis):'')+'</div></div>';
}
function render(){
  let host=document.getElementById("list"); let cnt=document.getElementById("count");
  if(state.theme==="⭐워치리스트"){
    host.innerHTML=WATCH.map(wcard).join("");
    cnt.textContent="워치리스트 "+WATCH.length+"종 · thesis 대기 "+META.watch_pending+"종";
    return;
  }
  let arr=DATA.filter(r=>state.theme==="전체"||r.theme===state.theme)
    .filter(r=>state.status==="전체"||statusOf(r.flag)===state.status)
    .filter(r=>!state.q||r.name.indexOf(state.q)>=0);
  const s=state.sort;
  arr.sort((a,b)=>{
    if(s==="name") return a.name.localeCompare(b.name,"ko");
    if(s==="distlow"){ return (b.dist==null?-9:b.dist)-(a.dist==null?-9:a.dist); }
    return (b[s]==null?-1e18:b[s])-(a[s]==null?-1e18:a[s]);
  });
  cnt.textContent=arr.length+"개 후보";
  host.innerHTML=arr.length?arr.map(card).join(""):'<div class="card">해당 조건 후보 없음</div>';
}
function sync(){ renderChips(); render(); }
document.getElementById("sortSel").onchange=e=>{state.sort=e.target.value;render();};
document.getElementById("q").oninput=e=>{state.q=e.target.value.trim();render();};
document.getElementById("subt").textContent="2026-06 스캔 · 후보 "+META.total+"종 · 7테마 · 규칙: 위성 ≤10%·1~2슬롯, 6개월 Track W 반사실로 판정";
document.getElementById("summary").innerHTML=
  '<div class="stat">early <b>'+META.early+'</b></div><div class="stat">late <b>'+META.late+'</b></div>'+
  '<div class="stat">소외 <b>'+META.soei+'</b></div><div class="stat">워치 <b>'+META.watch_total+'</b></div>';
document.getElementById("foot").innerHTML="진우퀀트 KOSDAQ 테마 lane · 생성 2026-06-07 · 데이터=kosdaq_monthly_scan_202606.csv · 매수신호 아님, forward 측정용";
sync();
</script></body></html>
